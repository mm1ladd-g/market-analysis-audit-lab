# CVE-2026-15308 is a CPU denial of service in CPython's incremental
# html.parser.HTMLParser when it receives repeated unterminated markup
# declarations. Market Analysis Audit Lab does not import html.parser or expose
# any route that parses client-controlled HTML. The newest stable CPython
# release (3.14.6) is used, while Grype currently lists the fix only in 3.15.0,
# which is not a stable release. Keep this exception package- and version-bound;
# remove it when a stable patched CPython image is available. Review no later
# than 2026-10-31. See SECURITY.md and SECURITY.fa.md.
ignore:
  - vulnerability: CVE-2026-15308
    package:
      name: python
      version: 3.14.6
      type: binary
