name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.lock
      - name: Install dependencies
        run: python -m pip install --require-hashes --requirement requirements.lock
      - name: Compile source
        run: python -m compileall -q audit_lab scripts tests
      - name: Run unit and synthetic integration tests
        run: python -m unittest discover -s tests -v
      - name: Verify public-release boundary
        run: python scripts/check_public_release.py

  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - name: Install exact development environment
        run: python -m pip install --require-hashes --requirement requirements-dev.lock
      - name: Verify dependency locks are synchronized
        run: |
          pip-compile --allow-unsafe --no-strip-extras --generate-hashes --output-file=requirements.lock requirements.txt
          pip-compile --allow-unsafe --no-strip-extras --generate-hashes --output-file=requirements-dev.lock requirements-dev.txt
          pip-compile --allow-unsafe --no-strip-extras --generate-hashes --output-file=requirements-release.lock requirements-release.txt
          git diff --exit-code -- requirements.lock requirements-dev.lock requirements-release.lock
      - name: Run Ruff
        run: ruff check audit_lab scripts tests

  container:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f
      - name: Build non-publishing container
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: .
          target: runtime
          push: false
          tags: market-analysis-audit-lab:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify runtime, tests, demo, PDF, and integrity bundle
        shell: bash
        run: |
          set -euo pipefail
          image=market-analysis-audit-lab:ci
          volume=audit-lab-ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}
          docker volume create "$volume" >/dev/null
          cleanup() { docker rm -f audit-lab-ci-web >/dev/null 2>&1 || true; docker volume rm "$volume" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          docker run --rm "$image" python -c 'import os; assert os.geteuid() != 0'
          docker run --rm "$image" python -c 'import importlib.util; assert importlib.util.find_spec("pip") is None'
          docker run --rm "$image" python -m unittest discover -s tests -v
          docker run --rm "$image" python scripts/check_public_release.py
          docker run --rm -v "$volume:/workspace" "$image" python -m audit_lab.cli demo --workspace /workspace
          docker run --rm -v "$volume:/workspace" "$image" python scripts/generate_audit_report.py --workspace /workspace
          docker run --rm -v "$volume:/workspace" "$image" python -m audit_lab.cli finalize --synthetic-demo --workspace /workspace
          docker run --rm -v "$volume:/workspace" "$image" python -m audit_lab.cli verify-final --synthetic-demo --workspace /workspace
          docker run --rm -i -v "$volume:/workspace:ro" "$image" python - <<'PY'
          import json
          from pathlib import Path
          settings = json.loads(
              Path("/workspace/final_audit/components/runtime_settings.public.json").read_text()
          )
          assert settings["analyst_name"] == "Synthetic Research Presenter (fictional)"
          assert settings["source"]["channel_id"] == "UC_SYNTHETIC_DEMO_NOT_REAL"
          assert settings["source"]["date_range"] == {
              "start": "2024-01-01", "end": "2024-01-07"
          }
          PY
          docker run -d --name audit-lab-ci-web --read-only --tmpfs /tmp:size=64m,mode=1777 \
            --cap-drop ALL --security-opt no-new-privileges --pids-limit 128 \
            -v "$volume:/workspace:ro" -p 127.0.0.1:18080:8080 "$image"
          for attempt in {1..30}; do
            curl --fail --silent http://127.0.0.1:18080/health >/dev/null && break
            test "$attempt" -lt 30
            sleep 1
          done
          curl --fail --silent http://127.0.0.1:18080/api/dashboard | python -m json.tool >/dev/null
      - name: Generate container SBOM
        uses: anchore/sbom-action@aa0e114b2e19480f157109b9922bda359bd98b90 # v0.20.8
        with:
          image: market-analysis-audit-lab:ci
          artifact-name: market-analysis-audit-lab-ci.spdx.json
      - name: Scan container for fixed high-severity vulnerabilities
        uses: anchore/scan-action@f6601287cdb1efc985d6b765bbf99cb4c0ac29d8 # v7.0.0
        with:
          image: market-analysis-audit-lab:ci
          fail-build: true
          severity-cutoff: high
          only-fixed: true
      - name: Reject critical vulnerabilities even when no fix exists
        uses: anchore/scan-action@f6601287cdb1efc985d6b765bbf99cb4c0ac29d8 # v7.0.0
        with:
          image: market-analysis-audit-lab:ci
          fail-build: true
          severity-cutoff: critical
          only-fixed: false
