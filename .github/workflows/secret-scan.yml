name: Secret scan

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: Scan the complete Git history with checksum-pinned Gitleaks
        shell: bash
        run: |
          set -euo pipefail
          test "$(git rev-list --count HEAD)" -gt 0
          url=https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error --location \
            --output /tmp/gitleaks.tar.gz "$url"
          echo '551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb  /tmp/gitleaks.tar.gz' \
            | sha256sum --check --strict
          tar --extract --gzip --file /tmp/gitleaks.tar.gz --directory /tmp gitleaks
          /tmp/gitleaks git --redact --verbose --no-banner .
