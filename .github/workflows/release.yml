name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-release.lock
      - name: Validate annotated release tag and source commit
        id: source
        shell: bash
        run: |
          set -euo pipefail
          [[ "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]
          test "$(git cat-file -t "$GITHUB_REF")" = tag
          source_commit=$(git rev-parse "$GITHUB_REF^{commit}")
          git merge-base --is-ancestor "$source_commit" origin/main
          version=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')
          test "$GITHUB_REF_NAME" = "v$version"
          echo "SOURCE_COMMIT=$source_commit" >> "$GITHUB_ENV"
          echo "commit=$source_commit" >> "$GITHUB_OUTPUT"
      - name: Install hash-locked release environment
        run: python -m pip install --require-hashes --requirement requirements-release.lock
      - name: Verify release candidate source
        run: |
          python -m compileall -q audit_lab scripts tests
          python -m unittest discover -s tests -v
          python scripts/check_public_release.py
          pip-audit --strict --requirement requirements.lock
      - name: Build Python and source artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          python -m build --no-isolation
          prefix="market-analysis-audit-lab-${GITHUB_REF_NAME}/"
          git archive --format=zip --prefix="$prefix" \
            --output="dist/market-analysis-audit-lab-${GITHUB_REF_NAME}.zip" "$SOURCE_COMMIT"
          git archive --format=tar.gz --prefix="$prefix" \
            --output="dist/market-analysis-audit-lab-${GITHUB_REF_NAME}.tar.gz" "$SOURCE_COMMIT"
          cyclonedx-py requirements requirements.lock \
            --pyproject pyproject.toml --spec-version 1.6 --output-reproducible \
            --output-format JSON --output-file dist/python-dependencies.cdx.json
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
        with:
          image: docker.io/tonistiigi/binfmt@sha256:400a4873b838d1b89194d982c45e5fb3cda4593fbfd7e08a02e76b03b21166f0
          platforms: arm64
      - uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
        with:
          version: v0.35.0
          driver-opts: image=moby/buildkit@sha256:0168606be2315b7c807a03b3d8aa79beefdb31c98740cebdffdfeebf31190c9f
      - uses: docker/login-action@184bdaa0721073962dff0199f1fb9940f07167d1 # v3.5.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Prepare image name
        id: image
        shell: bash
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"
      - name: Build and push an untagged multi-architecture candidate
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: |
          set -euo pipefail
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --target runtime \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            --label "org.opencontainers.image.revision=${SOURCE_COMMIT}" \
            --label "org.opencontainers.image.version=${GITHUB_REF_NAME}" \
            --provenance=mode=max \
            --sbom=true \
            --output "type=image,name=${IMAGE_NAME},push-by-digest=true,name-canonical=true,push=true" \
            --metadata-file dist/container-build-metadata.json \
            .
          index_digest=$(python -c 'import json; print(json.load(open("dist/container-build-metadata.json"))["containerimage.digest"])')
          [[ "$index_digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          echo "INDEX_DIGEST=$index_digest" >> "$GITHUB_ENV"
      - name: Resolve exact candidate platform digests
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: |
          set -euo pipefail
          docker buildx imagetools inspect --raw "$IMAGE_NAME@$INDEX_DIGEST" > dist/container-index.json
          python - <<'PY'
          import json
          import os
          import re
          from pathlib import Path

          index = json.loads(Path("dist/container-index.json").read_text())
          platform_digests = {}
          for manifest in index.get("manifests", []):
              platform = manifest.get("platform", {})
              if platform.get("os") == "linux" and platform.get("architecture") in {"amd64", "arm64"}:
                  platform_digests[platform["architecture"]] = manifest["digest"]
          if set(platform_digests) != {"amd64", "arm64"}:
              raise SystemExit(f"unexpected candidate platforms: {sorted(platform_digests)}")
          with open(os.environ["GITHUB_ENV"], "a", encoding="utf-8") as env_file:
              for architecture, digest in sorted(platform_digests.items()):
                  if not re.fullmatch(r"sha256:[0-9a-f]{64}", digest):
                      raise SystemExit(f"invalid {architecture} digest")
                  env_file.write(f"{architecture.upper()}_DIGEST={digest}\n")
          PY
      - name: Inventory exact runtime distributions for both platforms
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: |
          set -euo pipefail
          for architecture in amd64 arm64; do
            digest_name="${architecture^^}_DIGEST"
            digest="${!digest_name}"
            docker run --rm --platform "linux/$architecture" --user "$(id -u):$(id -g)" \
              -v "$PWD/dist:/out" "$IMAGE_NAME@$digest" \
              python scripts/generate_dependency_inventory.py \
              --lock requirements.lock --project-file pyproject.toml \
              --output "/out/python-dependency-licenses-$architecture.json"
          done
      - name: Generate amd64 candidate SBOM
        uses: anchore/sbom-action@aa0e114b2e19480f157109b9922bda359bd98b90 # v0.20.8
        with:
          image: ${{ steps.image.outputs.name }}@${{ env.AMD64_DIGEST }}
          output-file: dist/container-amd64.spdx.json
          upload-artifact: false
          upload-release-assets: false
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate arm64 candidate SBOM
        uses: anchore/sbom-action@aa0e114b2e19480f157109b9922bda359bd98b90 # v0.20.8
        with:
          image: ${{ steps.image.outputs.name }}@${{ env.ARM64_DIGEST }}
          output-file: dist/container-arm64.spdx.json
          upload-artifact: false
          upload-release-assets: false
          registry-username: ${{ github.actor }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
      - name: Reject critical amd64 candidate vulnerabilities
        uses: anchore/scan-action@f6601287cdb1efc985d6b765bbf99cb4c0ac29d8 # v7.0.0
        with:
          image: ${{ steps.image.outputs.name }}@${{ env.AMD64_DIGEST }}
          fail-build: true
          severity-cutoff: critical
          only-fixed: false
          output-format: json
          output-file: dist/container-amd64-critical-scan.json
      - name: Reject fixed high-severity amd64 candidate vulnerabilities
        uses: anchore/scan-action@f6601287cdb1efc985d6b765bbf99cb4c0ac29d8 # v7.0.0
        with:
          image: ${{ steps.image.outputs.name }}@${{ env.AMD64_DIGEST }}
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          output-format: json
          output-file: dist/container-amd64-fixed-high-scan.json
      - name: Reject critical arm64 candidate vulnerabilities
        uses: anchore/scan-action@f6601287cdb1efc985d6b765bbf99cb4c0ac29d8 # v7.0.0
        with:
          image: ${{ steps.image.outputs.name }}@${{ env.ARM64_DIGEST }}
          fail-build: true
          severity-cutoff: critical
          only-fixed: false
          output-format: json
          output-file: dist/container-arm64-critical-scan.json
      - name: Reject fixed high-severity arm64 candidate vulnerabilities
        uses: anchore/scan-action@f6601287cdb1efc985d6b765bbf99cb4c0ac29d8 # v7.0.0
        with:
          image: ${{ steps.image.outputs.name }}@${{ env.ARM64_DIGEST }}
          fail-build: true
          severity-cutoff: high
          only-fixed: true
          output-format: json
          output-file: dist/container-arm64-fixed-high-scan.json
      - name: Inspect both candidate image histories for credentials
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: |
          set -euo pipefail
          for architecture in amd64 arm64; do
            digest_name="${architecture^^}_DIGEST"
            digest="${!digest_name}"
            docker pull --platform "linux/$architecture" "$IMAGE_NAME@$digest"
            docker history --no-trunc "$IMAGE_NAME@$digest" > "dist/container-history-$architecture.txt"
          done
          if grep -Eiq 'sk-(proj-)?[A-Za-z0-9_-]{20,}|github_pat_[A-Za-z0-9_]{20,}|OPENAI_API_KEY=[^[:space:]]+' dist/container-history-*.txt; then
            echo "Potential credential found in container history" >&2
            exit 1
          fi
      - name: Promote the verified candidate digest to the version tag
        shell: bash
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            --tag "$IMAGE_NAME:$GITHUB_REF_NAME" "$IMAGE_NAME@$INDEX_DIGEST"
          published_digest=$(docker buildx imagetools inspect \
            "$IMAGE_NAME:$GITHUB_REF_NAME" --format '{{ .Manifest.Digest }}')
          test "$published_digest" = "$INDEX_DIGEST"
      - name: Attest published container provenance
        uses: actions/attest-build-provenance@00014ed6ed5efc5b1ab7f7f34a39eb55d41aa4f8 # v3.1.0
        with:
          subject-name: ${{ steps.image.outputs.name }}
          subject-digest: ${{ env.INDEX_DIGEST }}
          push-to-registry: true
      - name: Record published image metadata
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_DIGEST: ${{ env.INDEX_DIGEST }}
          RELEASE_TAG: ${{ github.ref_name }}
        run: |
          printf '%s@%s\n' "$IMAGE_NAME" "$IMAGE_DIGEST" > dist/container-image-digest.txt
          python - <<'PY'
          import hashlib
          import json
          import os
          from pathlib import Path

          def sha256(path: str) -> str:
              return hashlib.sha256(Path(path).read_bytes()).hexdigest()

          metadata = {
              "schema_version": "1.0.0",
              "release_tag": os.environ["RELEASE_TAG"],
              "source_commit": os.environ["SOURCE_COMMIT"],
              "container_image": os.environ["IMAGE_NAME"],
              "container_digest": os.environ["IMAGE_DIGEST"],
              "dockerfile_sha256": sha256("Dockerfile"),
              "requirements_lock_sha256": sha256("requirements.lock"),
          }
          Path("dist/release-metadata.json").write_text(
              json.dumps(metadata, indent=2, sort_keys=True) + "\n", encoding="utf-8"
          )
          PY
      - name: Record release checksums
        shell: bash
        run: |
          set -euo pipefail
          LC_ALL=C find dist -maxdepth 1 -type f ! -name SHA256SUMS -print0 \
            | LC_ALL=C sort -z | xargs -0 sha256sum > dist/SHA256SUMS
      - name: Attest release files
        uses: actions/attest-build-provenance@00014ed6ed5efc5b1ab7f7f34a39eb55d41aa4f8 # v3.1.0
        with:
          subject-path: dist/*
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes --title "$GITHUB_REF_NAME"
      - name: Promote verified image to latest
        env:
          IMAGE_NAME: ${{ steps.image.outputs.name }}
          IMAGE_DIGEST: ${{ env.INDEX_DIGEST }}
        run: docker buildx imagetools create --tag "$IMAGE_NAME:latest" "$IMAGE_NAME@$IMAGE_DIGEST"
