name: Usage question
description: Ask about setup or operation using synthetic or redacted context.
title: "[Question]: "
labels: [question]
body:
  - type: markdown
    attributes:
      value: Do not include API keys, cookies, private transcripts, personal data, or proprietary market rows.
  - type: textarea
    id: goal
    attributes:
      label: What are you trying to do?
      description: Describe the desired outcome and whether you are using the synthetic demo or an authorized source.
    validations:
      required: true
  - type: textarea
    id: attempted
    attributes:
      label: What have you tried?
      description: Include commands and sanitized output.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, private data, copyrighted transcripts, and proprietary market rows.
          required: true
