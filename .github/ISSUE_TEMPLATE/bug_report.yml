name: Bug report
description: Report a reproducible defect without including secrets or third-party evidence.
title: "[Bug]: "
labels: [bug, needs-triage]
body:
  - type: markdown
    attributes:
      value: Do not paste API keys, private transcripts, raw media, or identifying audit data. Use synthetic/minimized inputs.
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal synthetic reproduction
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, personal data, copyrighted source media, and private transcript content.
          required: true
